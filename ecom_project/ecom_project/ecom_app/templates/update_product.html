<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>Update Product</h1>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>Product Name</label>
            <input type="text"
                   name="p_name"
                   value="{{ product.p_name }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Product Type</label>
            <input type="text"
                   name="p_type"
                   value="{{ product.p_type }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Product Price</label>
            <input type="text"
                   name="p_price"
                   value="{{ product.p_price }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Product Quantity</label>
            <input type="text"
                   name="p_quantity"
                   value="{{ product.p_quantity }}"
                   class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">
            Update Product
        </button>

    </form>

</div>

</body>
</html>
