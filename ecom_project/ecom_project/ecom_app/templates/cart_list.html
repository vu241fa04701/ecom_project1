<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart Items</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1 class="text-center mt-4">Cart Items</h1>

    <div class="row">

        {% for item in cart_items %}

        <div class="col-md-4 mt-3">

            <div class="card">

                <div class="card-body">

                    <h5 class="card-title">
                        Cart ID : {{ item.cart_id }}
                    </h5>

                    <p class="card-text">
                        Product ID : {{ item.product_id }}
                    </p>

                    <p class="card-text">
                        Price : {{ item.p_price }}
                    </p>

                    <a href="/product/remove_from_cart/{{ item.product_id }}/"
   class="btn btn-danger">
                        Remove From Cart
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
