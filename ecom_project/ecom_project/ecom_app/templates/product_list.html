<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
{% for data in product_data %}
<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title">{{data.p_name}}</h5>
    <p class="card-text">Type: {{data.p_type}}</p>
      <p class="card-text">Quantity: {{data.p_quantity}}</p>
      <p class="card-text">Price: {{data.p_price}}</p>
      <a href="/product/update_product/{{data.id}}/"
   class="btn btn-primary">
    Update Item
</a>
      <form action="/product/del_by_id/{{data.id}}" method="POST">
          {% csrf_token %}
          <button class="btn btn-primary" type="submit">Delete Product</button>
      </form>
      <a href="/product/add_to_cart/{{data.id}}/" class="btn btn-success">Add To Cart</a>
  </div>
</div>
{% endfor %}
</body>
</html>
